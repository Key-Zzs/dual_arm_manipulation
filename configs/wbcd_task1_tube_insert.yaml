task:
  name: wbcd_task1_tube_insert
  dry_run: false
  default_arm: right
  max_retries_per_state: 3

execution:
  server:
    host: "127.0.0.1"
    port: 5000
    timeout_s: 2.0

  robot:
    arms: ["right"]
    default_arm: "right"
    enable_gripper: true
    auto_go_home: true

  safety:
    max_linear_step_m: 0.005
    max_angular_step_rad: 0.05
    max_servo_rate_hz: 30
    enable_motion_limits: true
    min_tcp_z_m: 0.07

perception:
  cameras:
    wrist:
      type: realsense
      model: D405
      serial: null
      width: 640
      height: 480
      fps: 30
      enable_depth: true

    head:
      type: realsense
      model: D435i
      serial: null
      width: 640
      height: 480
      fps: 30
      enable_depth: true

  detectors:
    tube_cap:
      backend: opencv
      params:
        hsv_lower: [0, 0, 0]
        hsv_upper: [180, 255, 255]
        min_area: 50
        max_area: 5000

    rack:
      backend: opencv
      params:
        min_area: 1000

    hole:
      backend: opencv
      params:
        min_radius_px: 5
        max_radius_px: 80

    apriltag:
      enabled: true
      family: tag36h11
      tag_size_m: 0.025

calibration:
  camera_intrinsics:
    load_from_device: true

  hand_eye:
    wrist_camera_to_ee:
      translation: [0.0, 0.0, 0.0]
      quaternion: [0.0, 0.0, 0.0, 1.0]

  apriltag_to_gripper:
    translation: [0.0, 0.0, 0.0]
    quaternion: [0.0, 0.0, 0.0, 1.0]

  gripper_to_tube_axis:
    translation: [0.0, 0.0, 0.0]
    quaternion: [0.0, 0.0, 0.0, 1.0]

planning:
  visual_servo:
    enabled: true
    max_iterations: 30
    pixel_error_threshold: 5
    max_step_m: 0.003

  grasp:
    pregrasp_height_m: 0.03
    descend_step_m: 0.002
    lift_after_grasp_m: 0.04

  insertion:
    preinsert_height_m: 0.03
    descend_step_m: 0.001
    max_insert_depth_m: 0.05
    use_micro_search: true
    search_pattern: cross
    search_step_m: 0.001
    search_radius_m: 0.003

states:
  initialize:
    enabled: true
    max_retries: 1
  locate_tube:
    enabled: true
    max_retries: 3
  align_to_tube:
    enabled: true
    max_retries: 3
  grasp_tube:
    enabled: true
    max_retries: 2
  verify_grasp:
    enabled: true
    max_retries: 2
  locate_rack:
    enabled: true
    max_retries: 3
  locate_empty_hole:
    enabled: true
    max_retries: 3
  align_to_hole:
    enabled: true
    max_retries: 3
  insert_tube:
    enabled: true
    max_retries: 3
  verify_insertion:
    enabled: true
    max_retries: 2
