task:
  name: debug_execution
  dry_run: true

execution:
  server:
    host: "127.0.0.1"
    port: 5000
    timeout_s: 0.5
  robot:
    arms: ["right"]
    default_arm: "right"
    enable_gripper: true
    auto_go_home: false
  safety:
    max_linear_step_m: 0.005
    max_angular_step_rad: 0.05
    max_servo_rate_hz: 30
    enable_motion_limits: true
    min_tcp_z_m: 0.0
