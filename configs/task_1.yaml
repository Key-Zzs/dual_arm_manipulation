task:
  name: task_1
  dry_run: false
  default_arm: right
  max_retries_per_stage: 3

comm:
  type: nero_comm_adapter
  robot_ip: "127.0.0.1"
  robot_port: 4242
  heartbeat: 20
  action_send_freq: 100.0
  min_delta_norm: 0.001
  debug: false

gripper:
  use_gripper: true
  gripper_max_open: 0.1
  gripper_force: 2.0
  gripper_reverse: false
  close_threshold: 0.5

perception:
  cameras:
    wrist:
      type: realsense
      model: D405
      serial: null
      width: 640
      height: 480
      fps: 30
      enable_depth: true
    head:
      type: realsense
      model: D435i
      serial: null
      width: 640
      height: 480
      fps: 30
      enable_depth: true

  detectors:
    tube:
      backend: opencv
    rack:
      backend: opencv
    hole:
      backend: opencv
    apriltag:
      backend: apriltag
      enabled: true

planning:
  visual_servo:
    enabled: true
    max_iterations: 30
    pixel_error_threshold: 5
    max_step_m: 0.003

  grasp:
    pregrasp_height_m: 0.03
    lift_after_grasp_m: 0.04
    mock_grasp_delta: [0, 0, 0, 0, 0, 0]

  insertion:
    preinsert_height_m: 0.03
    descend_step_m: 0.001
    use_micro_search: true
    search_radius_m: 0.003
    search_step_m: 0.001
    mock_insert_delta: [0, 0, 0, 0, 0, 0]

stages:
  locate_tube:
    enabled: true
    max_retries: 3
  grasp_tube:
    enabled: true
    max_retries: 3
  locate_rack:
    enabled: true
    max_retries: 3
  locate_empty_hole:
    enabled: true
    max_retries: 3
  insert_tube:
    enabled: true
    max_retries: 3
