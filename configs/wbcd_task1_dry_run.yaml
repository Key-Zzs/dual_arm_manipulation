task:
  name: wbcd_task1_tube_insert
  dry_run: true
  default_arm: right
  max_retries_per_state: 1

execution:
  server:
    host: "127.0.0.1"
    port: 5000
    timeout_s: 0.5

  robot:
    arms: ["right"]
    default_arm: "right"
    enable_gripper: true
    auto_go_home: false

  safety:
    max_linear_step_m: 0.005
    max_angular_step_rad: 0.05
    max_servo_rate_hz: 30
    enable_motion_limits: true
    min_tcp_z_m: 0.0

perception:
  cameras:
    wrist:
      type: mock
      model: mock_wrist
      serial: null
      width: 640
      height: 480
      fps: 30
      enable_depth: true
    head:
      type: mock
      model: mock_head
      serial: null
      width: 640
      height: 480
      fps: 30
      enable_depth: true

  detectors:
    tube_cap:
      backend: mock
      params:
        center_px: [320, 240]
    rack:
      backend: mock
      params:
        center_px: [320, 240]
    hole:
      backend: mock
      params:
        center_px: [320, 240]
    apriltag:
      enabled: false
      family: tag36h11
      tag_size_m: 0.025

calibration:
  camera_intrinsics:
    load_from_device: false

  hand_eye:
    wrist_camera_to_ee:
      translation: [0.0, 0.0, 0.0]
      quaternion: [0.0, 0.0, 0.0, 1.0]

  apriltag_to_gripper:
    translation: [0.0, 0.0, 0.0]
    quaternion: [0.0, 0.0, 0.0, 1.0]

  gripper_to_tube_axis:
    translation: [0.0, 0.0, 0.0]
    quaternion: [0.0, 0.0, 0.0, 1.0]

planning:
  visual_servo:
    enabled: true
    max_iterations: 3
    pixel_error_threshold: 5
    max_step_m: 0.003

  grasp:
    pregrasp_height_m: 0.03
    descend_step_m: 0.002
    lift_after_grasp_m: 0.04

  insertion:
    preinsert_height_m: 0.03
    descend_step_m: 0.001
    max_insert_depth_m: 0.05
    use_micro_search: true
    search_pattern: cross
    search_step_m: 0.001
    search_radius_m: 0.003

states:
  initialize:
    enabled: true
    max_retries: 1
  locate_tube:
    enabled: true
    max_retries: 1
  align_to_tube:
    enabled: true
    max_retries: 1
  grasp_tube:
    enabled: true
    max_retries: 1
  verify_grasp:
    enabled: true
    max_retries: 1
  locate_rack:
    enabled: true
    max_retries: 1
  locate_empty_hole:
    enabled: true
    max_retries: 1
  align_to_hole:
    enabled: true
    max_retries: 1
  insert_tube:
    enabled: true
    max_retries: 1
  verify_insertion:
    enabled: true
    max_retries: 1
